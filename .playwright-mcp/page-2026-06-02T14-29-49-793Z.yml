          - generic [ref=e270]:
            - heading "Agent-assisted, human-shipped." [level=3] [ref=e271]
            - paragraph [ref=e272]: A team of LLM agents (codegen, review, ops) handles toil and parallelism. A human reviews every line that ships. You hire a person, not a model.
          - generic [ref=e274]: "#workflow"
        - generic [ref=e275]:
