            - heading "One throat to choke. Then unchoke." [level=3] [ref=e257]
            - paragraph [ref=e258]: No account manager between you and the code. The person who writes the contract is the person who pushes to main. Pager rotates back to the same person.
          - generic [ref=e260]: "#ownership"
        - generic [ref=e261]:
          - generic [ref=e262]: "02"
          - generic [ref=e263]:
            - heading "Fixed scope, fixed price, weekly demos." [level=3] [ref=e264]
            - paragraph [ref=e265]: Quote inside 48h of intake. Demo every Friday. Anything outside scope becomes its own line item with its own quote. No surprises on the invoice.
          - generic [ref=e267]: "#billing"
        - generic [ref=e268]:
