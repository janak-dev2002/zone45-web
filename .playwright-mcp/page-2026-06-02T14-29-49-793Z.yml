          - generic [ref=e277]:
            - heading "You own everything on day one." [level=3] [ref=e278]
            - paragraph [ref=e279]: Source, infra, domain, secrets — handed over in escrow before kickoff, transferred on completion. We can't hold your business hostage and we won't.
