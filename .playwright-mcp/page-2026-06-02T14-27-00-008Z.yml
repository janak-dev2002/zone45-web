          - generic [ref=e274]:
            - heading "Agent-assisted, human-shipped." [level=3] [ref=e275]
            - paragraph [ref=e276]: A team of LLM agents (codegen, review, ops) handles toil and parallelism. A human reviews every line that ships. You hire a person, not a model.
          - generic [ref=e278]: "#workflow"
        - generic [ref=e279]:
          - generic [ref=e280]: "04"
          - generic [ref=e281]:
            - heading "You own everything on day one." [level=3] [ref=e282]
            - paragraph [ref=e283]: Source, infra, domain, secrets — handed over in escrow before kickoff, transferred on completion. We can't hold your business hostage and we won't.
