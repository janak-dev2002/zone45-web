        - generic [ref=e255]: Why ZoneForty5
        - heading "Four reasons. Each one is a contract clause." [level=2] [ref=e256]
      - generic [ref=e257]:
        - generic [ref=e258]:
          - generic [ref=e259]: "01"
          - generic [ref=e260]:
            - heading "One throat to choke. Then unchoke." [level=3] [ref=e261]
            - paragraph [ref=e262]: No account manager between you and the code. The person who writes the contract is the person who pushes to main. Pager rotates back to the same person.
          - generic [ref=e264]: "#ownership"
        - generic [ref=e265]:
          - generic [ref=e266]: "02"
          - generic [ref=e267]:
            - heading "Fixed scope, fixed price, weekly demos." [level=3] [ref=e268]
            - paragraph [ref=e269]: Quote inside 48h of intake. Demo every Friday. Anything outside scope becomes its own line item with its own quote. No surprises on the invoice.
          - generic [ref=e271]: "#billing"
        - generic [ref=e272]:
