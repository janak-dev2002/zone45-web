name: Deploy

on:
  push:
    branches: [main]
  # Allow manual deploys from the Actions UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: commit SHA)"
        required: false
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  REPO: janak-dev2002/zone45-web
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}

jobs:
  # ── Build and push Docker images to GHCR ─────────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Nginx image (includes frontend SSG build)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/nginx.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/nginx:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/nginx:latest
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx
          build-args: |
            VITE_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
            VITE_API_URL=/api

  # ── Deploy to EC2 via SSH ─────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    # packages: read is required so the GITHUB_TOKEN embedded in the SSH script
    # can authenticate against GHCR to pull the private packages on EC2.
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "devops/docker-compose.yml"
          target: "/home/${{ secrets.EC2_SSH_USER }}/zone45-web/"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,REGISTRY,REPO
          script: |
            set -euo pipefail

            # ── Preflight checks ──────────────────────────────────────────────
            if [ ! -f /home/${{ secrets.EC2_SSH_USER }}/zone45-web/.env ]; then
              echo "ERROR: /home/${{ secrets.EC2_SSH_USER }}/zone45-web/.env is missing."
              echo "Create it from devops/.env.example and fill in real values before deploying."
              exit 1
            fi

            cd /home/${{ secrets.EC2_SSH_USER }}/zone45-web

            # ── Authenticate to GHCR ──────────────────────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ── Pull new images ───────────────────────────────────────────────
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ env.IMAGE_TAG }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/nginx:${{ env.IMAGE_TAG }}

            # ── Start postgres + redis, then run migrations ───────────────────
            # Start DB services first so postgres is ready before the API boots.
            docker compose up -d postgres redis

            # Wait for postgres to accept connections (up to 90s)
            POSTGRES_USER=$(grep "^POSTGRES_USER=" .env | cut -d= -f2)
            POSTGRES_DB=$(grep "^POSTGRES_DB="   .env | cut -d= -f2)
            for i in $(seq 1 18); do
              docker exec zf45-postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                > /dev/null 2>&1 && break
              echo "Waiting for postgres... attempt $i/18"
              sleep 5
            done

            # Apply each migration — Up section only (sed strips the Down section).
            # Safe to re-run: psql prints a notice for already-existing objects
            # but exits 0, so this is idempotent across deploys.
            REPO_RAW="https://raw.githubusercontent.com/${{ env.REPO }}/main"
            for m in \
              000_init_extensions \
              001_admin_users \
              002_portfolio_projects \
              003_blog_posts \
              004_tags \
              005_post_tags \
              006_contact_submissions; do
              echo "Migration: $m"
              curl -sL "${REPO_RAW}/database/migrations/${m}.sql" \
                | sed '/-- Down Migration/,$d' \
                | docker exec -i zf45-postgres psql -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            done
            echo "Migrations complete."

            # ── Start / update all services ───────────────────────────────────
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            docker compose up -d --no-build

            # ── Cleanup ───────────────────────────────────────────────────────
            docker image prune -f

            echo "Deploy complete — running containers:"
            docker compose ps

      - name: Smoke-test deployed API
        run: |
          # Poll until healthy or 3-minute timeout.
          # Cold start on t3.small: postgres init (~30s) + api startup (~15s) + nginx = ~60s.
          echo "Waiting for stack to become healthy..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 https://zoneforty5.tech/api/health || echo "000")
            echo "Attempt $i/18 — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 3 minutes"
          exit 1
