name: Deploy

on:
  push:
    branches: [main]
  # Allow manual deploys from the Actions UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: commit SHA)"
        required: false
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  REPO: janak-dev2002/zone45-web
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}

jobs:
  # ── Build and push Docker images to GHCR ─────────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Nginx image (includes frontend SSG build)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/nginx.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/nginx:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/nginx:latest
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx
          build-args: |
            VITE_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
            VITE_API_URL=/api

  # ── Deploy to EC2 via SSH ─────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    # No GitHub Environment used — secrets are repo-level (Settings → Secrets → Actions)

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "devops/docker-compose.yml"
          target: "/home/${{ secrets.EC2_SSH_USER }}/zone45-web/"
          strip_components: 1  # removes 'devops/' prefix → docker-compose.yml at repo root

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,REGISTRY,REPO
          script: |
            set -euo pipefail
            cd /home/${{ secrets.EC2_SSH_USER }}/zone45-web

            # Authenticate to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ env.IMAGE_TAG }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/nginx:${{ env.IMAGE_TAG }}

            # Tag pulled images as the version referenced by IMAGE_TAG env var
            export IMAGE_TAG=${{ env.IMAGE_TAG }}

            # Bring up updated services (rolling — postgres and redis are unaffected)
            docker compose up -d --no-build

            # Prune dangling images to free disk space
            docker image prune -f

            echo "Deploy complete. Running containers:"
            docker compose ps

      - name: Smoke-test deployed API
        run: |
          # Poll until healthy or 3-minute timeout.
          # Cold start on t3.small: postgres init (~30s) + api startup (~15s) + nginx = ~60s.
          echo "Waiting for stack to become healthy..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 https://zoneforty5.tech/api/health || echo "000")
            echo "Attempt $i/18 — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 3 minutes"
          exit 1
