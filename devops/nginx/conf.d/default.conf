# ── HTTP: redirect all traffic to HTTPS, serve ACME challenge ─────────────────
server {
    listen 80;
    listen [::]:80;
    server_name zoneforty5.tech www.zoneforty5.tech;

    # Let's Encrypt ACME webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://zoneforty5.tech$request_uri;
    }
}

# ── HTTPS: www → apex redirect ────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.zoneforty5.tech;

    ssl_certificate     /etc/letsencrypt/live/zoneforty5.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zoneforty5.tech/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/zoneforty5.tech/chain.pem;

    return 301 https://zoneforty5.tech$request_uri;
}

# ── HTTPS: primary site ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name zoneforty5.tech;

    ssl_certificate     /etc/letsencrypt/live/zoneforty5.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zoneforty5.tech/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/zoneforty5.tech/chain.pem;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' https://challenges.cloudflare.com; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: https://cdn.zoneforty5.tech; "
        "font-src 'self'; "
        "connect-src 'self'; "
        "frame-src https://challenges.cloudflare.com; "
        "object-src 'none'; "
        "base-uri 'self'; "
        "form-action 'self';"
        always;

    # ── Static files served directly ──────────────────────────────────────────
    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        add_header Content-Type text/plain;
    }

    # Immutable hashed assets (Vite output: _assets/*, *.js, *.css with hash)
    location ~* \.(js|css|woff2?|ttf|otf|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # re-apply security headers (nginx add_header is not inherited in nested blocks)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── SPA fallback — React Router handles all non-file, non-api paths ────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
